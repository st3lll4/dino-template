<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Extension template</title>
    <style>
      body {
        margin: 12px;
        width: 340px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h2 {
        margin: 0 0 4px;
        font-size: 15px;
      }

      .meta {
        margin: 0 0 12px;
        font-size: 12px;
        color: #666;
      }

      .meta a {
        color: inherit;
      }

      button {
        display: block;
        width: 100%;
        margin-bottom: 8px;
        padding: 8px;
      }

      #result {
        margin: 8px 0 0;
        min-height: 48px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <h2>Extension template</h2>
    <p class="meta">
      Test build of an open source cross-browser extension template by
      <a href="https://github.com/st3lll4" target="_blank">@st3lll4</a>
    </p>
    <button id="ping">Ping background</button>
    <button id="get-selection">Get selected text</button>
    <button id="get-duck">Get a duck</button>
    <button id="test-post">Test POST</button>
    <p id="result"></p>
    <img id="duck-img" style="display:none; width:100%; margin-top:8px;" />
    <script type="module" src="popup.ts"></script>
  </body>
</html>
