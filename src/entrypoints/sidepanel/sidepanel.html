<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Side Panel</title>
    <style>
      body {
        margin: 12px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button {
        display: block;
        width: 100%;
        margin-bottom: 8px;
        padding: 8px;
      }

      #result {
        margin: 8px 0 0;
        min-height: 48px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <h2>🦕 dino-template</h2>
    <p class="meta">
       An open source cross-browser extension template by
      <a href="https://github.com/st3lll4" target="_blank">@st3lll4.</a>
    </p> 
    <p>Click the buttons below to test various extension features:</p>
    <button id="ping">Ping background</button>
    <button id="get-selection">Get selected text</button>
    <button id="get-duck">Get a duck</button>
    <button id="test-post">Test POST</button>
    <p id="result"></p>
    <img id="duck-img" style="display:none; width:100%; margin-top:8px;" />
    <script type="module" src="sidepanel.ts"></script>
  </body>
</html>
