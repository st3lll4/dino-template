# Runs automatically on push to main, or manually from any branch via
# Actions → Build → Run workflow.
#
# Builds the extension for Chrome and Firefox in parallel and uploads
# the output as artifacts. Artifacts are available for 90 days under
# the workflow run in the Actions tab.
#
# This workflow does not publish to any store.
# See publish.yml for that.

name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-chrome:
    name: Build (Chrome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: extension-chrome
          path: dist/

  build-firefox:
    name: Build (Firefox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:firefox
      - uses: actions/upload-artifact@v4
        with:
          name: extension-firefox
          path: dist/
