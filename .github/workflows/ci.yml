name: CI

on:
  push:
    branches:
      - "**"

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (Chrome MV3)
        run: npm run build

      - name: Build (Firefox MV2)
        run: npm run build:firefox
